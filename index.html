<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>
    <header>
        <div class="top-bar">
            <div class="logo">News<span>Pulse</span></div>
            
            <form class="search-box" id="search-form">
                <div class="search-input-wrapper">
                    <input type="text" id="search-input" placeholder="Search for news..." autocomplete="off">
                    <div id="search-history-dropdown" class="search-history-dropdown hidden"></div>
                </div>
                <button type="submit">Search</button>
            </form>
        </div>
        
        <div class="categories" id="categories">
            <button class="cat-btn active" data-id="general">General</button>
            <button class="cat-btn" data-id="business">Business</button>
            <button class="cat-btn" data-id="technology">Technology</button>
            <button class="cat-btn" data-id="sports">Sports</button>
            <button class="cat-btn" data-id="entertainment">Entertainment</button>
            <button class="cat-btn" data-id="health">Health</button>
            <button class="cat-btn" data-id="science">Science</button>
        </div>
    </header>

    <main>
        <h2 id="main-title">Latest General News</h2>

        <div id="loading" class="message-box hidden">
            <div class="loader"></div>
            <p>Loading news for you...</p>
        </div>
        
        <div id="error-msg" class="message-box hidden">
            <h3>Oops!</h3>
            <p id="error-text">Something went wrong.</p>
        </div>

        <div id="news-container" class="news-container">
            <!-- News go here -->
        </div>
    </main>

    <footer>
        <p>Created for my college project using HTML, CSS, and JS. Powered by NewsAPI.</p>
    </footer>

    <!-- Include all Javascript files -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
